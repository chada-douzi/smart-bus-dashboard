<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-image: radial-gradient(ellipse at 20% 50%, #1e3a5f33 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 20%, #38bdf820 0%, transparent 50%);
    }

    .box {
      background: #1e293b;
      padding: 40px 36px;
      border-radius: 16px;
      width: 340px;
      text-align: center;
      border: 1px solid #334155;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px #38bdf810;
    }

    .logo {
      font-size: 40px;
      margin-bottom: 8px;
    }

    h2 {
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px #38bdf820;
    }

    input::placeholder { color: #475569; }

    button {
      padding: 12px;
      width: 100%;
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
  </style>
</head>

<body>

<div class="box">
  <div class="logo">🚌</div>
  <h2>Smart Bus</h2>
  <p class="subtitle">Connectez-vous à votre dashboard</p>

  <form method="POST" action="/login">
    <div class="input-group">
      <label>Username</label>
      <input name="username" placeholder="Entrez votre nom" required />
    </div>
    <div class="input-group">
      <label>Password</label>
      <input name="password" type="password" placeholder="••••••••" required />
    </div>
    <button type="submit">Login</button>
  </form>
</div>

</body>
</html>
